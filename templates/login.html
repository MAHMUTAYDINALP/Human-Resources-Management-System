<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - İK Yönetim Sistemi</title>
    <style>
        /* GENEL SAYFA AYARLARI */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            /* Arka plan resmi şimdilik koyu renk olsun, sonra resim ekleriz */
            background-color: #1a1a2e; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            overflow: hidden;
        }

        /* ORİJİNAL CSS KODLARI */
        .login-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            padding: 40px;
            margin: 20px auto;
            transform: translate(-50%, -55%);
            background: rgba(35, 112, 112, 0.882);
            box-sizing: border-box;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            border: 1px solid #000000;
        }

        .login-box p:first-child {
            margin: 0 0 30px;
            padding: 0;
            color: #bebbbb;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .login-box .user-box {
            position: relative;
        }

        .login-box .user-box input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: #000000;
            margin-bottom: 30px;
            border: none;
            border-bottom: 1px solid #000000;
            outline: none;
            background: transparent;
        }

        .login-box .user-box label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size:18px;
            color: #ccc9c9;
            pointer-events: none;
            transition: .5s;
        }

        .login-box .user-box input:focus ~ label,
        .login-box .user-box input:valid ~ label {
            top: -20px;
            left: 0;
            color: #000000;
            font-size: 12px;
        }

        /* Submit Butonu Stilleri (button etiketi için güncellendi) */
        .submit-btn {
            position: relative;
            display: inline-block;
            padding: 10px 20px;
            font-weight: bold;
            color: #bebbbb;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            overflow: hidden;
            transition: .5s;
            margin-top: 40px;
            letter-spacing: 3px;
            background: transparent;
            border: none;
            cursor: pointer;
            width: 100%; /* Butonu tam genişlik yapalım */
        }

        .submit-btn:hover {
            background: #000000;
            color: #272727;
            border-radius: 5px;
        }

        .submit-btn span {
            position: absolute;
            display: block;
        }

        .submit-btn span:nth-child(1) {
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #000000);
            animation: btn-anim1 1.5s linear infinite;
        }

        @keyframes btn-anim1 {
            0% { left: -100%; }
            50%,100% { left: 100%; }
        }

        .submit-btn span:nth-child(2) {
            top: -100%;
            right: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #000000);
            animation: btn-anim2 1.5s linear infinite;
            animation-delay: .375s
        }

        @keyframes btn-anim2 {
            0% { top: -100%; }
            50%,100% { top: 100%; }
        }

        .submit-btn span:nth-child(3) {
            bottom: 0;
            right: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(270deg, transparent, #000000);
            animation: btn-anim3 1.5s linear infinite;
            animation-delay: .75s
        }

        @keyframes btn-anim3 {
            0% { right: -100%; }
            50%,100% { right: 100%; }
        }

        .submit-btn span:nth-child(4) {
            bottom: -100%;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(360deg, transparent, #000000);
            animation: btn-anim4 1.5s linear infinite;
            animation-delay: 1.125s
        }

        @keyframes btn-anim4 {
            0% { bottom: -100%; }
            50%,100% { bottom: 100%; }
        }

        .login-box p:last-child {
            color: #adadad;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        .login-box a.a2 {
            color: #000000;
            text-decoration: none;
        }

        .login-box a.a2:hover {
            background: transparent;
            color: #000000;
            border-radius: 5px;
        }

        /* Hata mesajı kutusu için stil */
        #error-box {
            background-color: rgba(220, 53, 69, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none; /* Başlangıçta gizli */
        }
    </style>
</head>
<body>

    <div class="login-box">
        <p>Giriş Yap</p>
        
        <div id="error-box"></div>

        <form id="loginForm">
          <div class="user-box">
            <input required="" name="username" type="text" id="emailInput">
            <label>Email</label>
          </div>
          <div class="user-box">
            <input required="" name="password" type="password" id="passwordInput">
            <label>Şifre</label>
          </div>
          <button type="submit" class="submit-btn">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            Giriş Yap
          </button>
        </form>
        <p>Hesabın yok mu? <a href="#" class="a2">Kayıt Ol!</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Sayfanın yenilenmesini engelle

            // Inputlardaki verileri al
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorBox = document.getElementById('error-box');

            // Hata kutusunu temizle ve gizle
            errorBox.style.display = 'none';
            errorBox.textContent = '';

            // Backend'in beklediği formatta (form-data) veriyi hazırla
            // DİKKAT: Backend 'username' bekliyor, biz buraya emaili koyuyoruz.
            const formData = new URLSearchParams();
            formData.append('username', email); 
            formData.append('password', password);

            try {
                // Backend'e istek gönder
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    // GİRİŞ BAŞARILI
                    const data = await response.json();
                    // Token'ı tarayıcıya kaydet (ileride kullanacağız)
                    localStorage.setItem('access_token', data.access_token);
                    
                    alert("Giriş Başarılı! Yönlendiriliyorsunuz...");
                    // Şimdilik sadece başarılı mesajı verelim. İleride ana sayfaya yönlendireceğiz.
                    // window.location.href = '/dashboard'; 
                } else {
                    // GİRİŞ BAŞARISIZ (Şifre yanlış vs.)
                    const errorData = await response.json();
                    errorBox.textContent = "Giriş Başarısız: " + (errorData.detail || "Bilgilerinizi kontrol edin.");
                    errorBox.style.display = 'block';
                }
            } catch (error) {
                // SUNUCU HATASI
                errorBox.textContent = "Sunucuya bağlanılamadı. Lütfen daha sonra tekrar deneyin.";
                errorBox.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>

</body>
</html>
